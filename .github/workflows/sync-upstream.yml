name: Sync upstream
on:
  schedule:
    - cron: '17 9 * * *'   # daily
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repo (owner/name) — override for testing'
        default: 'infiniteCable2/opendbc'
        required: false
      upstream_ref:
        description: 'Upstream ref — override for testing'
        default: 'master'
        required: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      UP_REPO: ${{ github.event.inputs.upstream_repo || 'infiniteCable2/opendbc' }}
      UP_REF: ${{ github.event.inputs.upstream_ref || 'master' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Merge upstream into master (PR on conflict)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream "https://github.com/${UP_REPO}.git"
          git fetch upstream "${UP_REF}"

          if git merge "upstream/${UP_REF}" -m "Merge upstream ${UP_REPO} ${UP_REF}"; then
            git push origin master
          else
            echo "Merge conflict -> opening PR for manual resolution"
            git merge --abort
            git push -f origin "upstream/${UP_REF}:refs/heads/upstream-merge"
            if [ -z "$(gh pr list --head upstream-merge --base master --state open --json number --jq '.[].number')" ]; then
              gh pr create --head upstream-merge --base master \
                --title "Upstream sync needs manual conflict resolution" \
                --assignee NotHassan \
                --body "Automatic merge of \`${UP_REPO}\` \`${UP_REF}\` into \`master\` hit conflicts. Click **Resolve conflicts**, keep the Tiguan changes where they collide, then merge. Daily syncs resume automatically after."
            else
              echo "PR already open - branch updated to latest upstream."
            fi
          fi

      - name: Keepalive (reset GitHub's 60-day scheduled-workflow timer)
        if: always()
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/sync-upstream.yml/enable"
