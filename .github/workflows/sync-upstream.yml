name: Sync upstream
on:
  schedule:
    - cron: '17 9 * * *'   # daily
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Merge upstream master into master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/infiniteCable2/opendbc.git
          git fetch upstream master
          git merge upstream/master -m "Merge upstream infiniteCable2/opendbc master"
          git push origin master

      - name: Keepalive (reset GitHub's 60-day scheduled-workflow timer)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/sync-upstream.yml/enable"
